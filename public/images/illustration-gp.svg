<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <!-- Background -->
  <rect width="400" height="240" fill="#F5F1EB"/>

  <!-- Decorative dots -->
  <circle cx="35" cy="35" r="2" fill="#2B5A8C" opacity="0.1"/>
  <circle cx="55" cy="50" r="1.5" fill="#D4853A" opacity="0.08"/>
  <circle cx="360" cy="30" r="2" fill="#D4853A" opacity="0.12"/>
  <circle cx="345" cy="55" r="1.5" fill="#2B5A8C" opacity="0.08"/>
  <circle cx="25" cy="210" r="2" fill="#D4853A" opacity="0.1"/>
  <circle cx="375" cy="205" r="1.5" fill="#2B5A8C" opacity="0.08"/>

  <!-- Globe -->
  <circle cx="185" cy="125" r="60" fill="#2B5A8C" opacity="0.1"/>
  <circle cx="185" cy="125" r="60" fill="none" stroke="#2B5A8C" stroke-width="2"/>

  <!-- Globe latitude lines -->
  <ellipse cx="185" cy="125" rx="60" ry="20" fill="none" stroke="#2B5A8C" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="185" cy="105" rx="50" ry="12" fill="none" stroke="#2B5A8C" stroke-width="0.8" opacity="0.25"/>
  <ellipse cx="185" cy="145" rx="50" ry="12" fill="none" stroke="#2B5A8C" stroke-width="0.8" opacity="0.25"/>

  <!-- Globe longitude lines -->
  <ellipse cx="185" cy="125" rx="20" ry="60" fill="none" stroke="#2B5A8C" stroke-width="0.8" opacity="0.3"/>
  <ellipse cx="185" cy="125" rx="45" ry="60" fill="none" stroke="#2B5A8C" stroke-width="0.8" opacity="0.2"/>
  <line x1="185" y1="65" x2="185" y2="185" stroke="#2B5A8C" stroke-width="0.8" opacity="0.2"/>

  <!-- Simplified continent shapes -->
  <g opacity="0.2">
    <path d="M170 90 Q175 85 185 88 Q190 92 188 100 Q182 98 175 95Z" fill="#2B5A8C"/>
    <path d="M195 95 Q205 90 210 100 Q208 110 200 108 Q195 105 195 95Z" fill="#2B5A8C"/>
    <path d="M160 120 Q170 115 178 118 Q175 128 165 130Z" fill="#2B5A8C"/>
    <path d="M195 130 Q205 125 215 130 Q212 140 200 142 Q195 138 195 130Z" fill="#2B5A8C"/>
  </g>

  <!-- Newspaper clipping 1 - behind globe -->
  <g transform="translate(85, 55) rotate(-8)">
    <rect width="55" height="70" rx="2" fill="white" stroke="#2B5A8C" stroke-width="1" opacity="0.8"/>
    <rect x="6" y="6" width="43" height="4" rx="1" fill="#2B5A8C" opacity="0.3"/>
    <line x1="6" y1="16" x2="49" y2="16" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="6" y1="22" x2="45" y2="22" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="6" y1="28" x2="48" y2="28" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="6" y1="34" x2="40" y2="34" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="6" y1="40" x2="47" y2="40" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <rect x="6" y="48" width="20" height="14" rx="1" fill="#2B5A8C" opacity="0.06"/>
  </g>

  <!-- Newspaper clipping 2 - behind globe -->
  <g transform="translate(255, 70) rotate(5)">
    <rect width="50" height="60" rx="2" fill="white" stroke="#2B5A8C" stroke-width="1" opacity="0.8"/>
    <rect x="5" y="5" width="40" height="3.5" rx="1" fill="#2B5A8C" opacity="0.3"/>
    <line x1="5" y1="14" x2="45" y2="14" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="5" y1="20" x2="42" y2="20" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="5" y1="26" x2="44" y2="26" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <line x1="5" y1="32" x2="38" y2="32" stroke="#2B5A8C" stroke-width="1" opacity="0.12"/>
    <rect x="25" y="38" width="18" height="14" rx="1" fill="#2B5A8C" opacity="0.06"/>
  </g>

  <!-- Newspaper clipping 3 - bottom -->
  <g transform="translate(110, 160) rotate(3)">
    <rect width="48" height="45" rx="2" fill="white" stroke="#2B5A8C" stroke-width="1" opacity="0.7"/>
    <rect x="5" y="5" width="38" height="3" rx="1" fill="#2B5A8C" opacity="0.25"/>
    <line x1="5" y1="14" x2="43" y2="14" stroke="#2B5A8C" stroke-width="1" opacity="0.1"/>
    <line x1="5" y1="20" x2="40" y2="20" stroke="#2B5A8C" stroke-width="1" opacity="0.1"/>
    <line x1="5" y1="26" x2="42" y2="26" stroke="#2B5A8C" stroke-width="1" opacity="0.1"/>
    <line x1="5" y1="32" x2="35" y2="32" stroke="#2B5A8C" stroke-width="1" opacity="0.1"/>
  </g>

  <!-- Magnifying glass -->
  <g transform="translate(280, 140)">
    <!-- Glass circle -->
    <circle cx="0" cy="0" r="32" fill="white" fill-opacity="0.3" stroke="#D4853A" stroke-width="3"/>
    <!-- Glass rim highlight -->
    <circle cx="0" cy="0" r="28" fill="none" stroke="#D4853A" stroke-width="0.5" opacity="0.3"/>
    <!-- Handle -->
    <line x1="22" y1="22" x2="50" y2="50" stroke="#D4853A" stroke-width="5" stroke-linecap="round"/>
    <!-- Handle accent -->
    <line x1="22" y1="22" x2="28" y2="28" stroke="#2B5A8C" stroke-width="5" stroke-linecap="round" opacity="0.3"/>
    <!-- Lens glare -->
    <path d="M-12 -18 Q-6 -22 0 -20" stroke="white" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.5"/>
  </g>

  <!-- Small question mark thought bubbles -->
  <g opacity="0.15">
    <text x="310" y="85" font-family="serif" font-size="16" fill="#2B5A8C" font-weight="bold">?</text>
    <text x="325" y="100" font-family="serif" font-size="12" fill="#D4853A" font-weight="bold">?</text>
  </g>

  <!-- Decorative corner lines -->
  <g opacity="0.08" stroke="#2B5A8C" stroke-width="1">
    <line x1="20" y1="20" x2="50" y2="20"/>
    <line x1="20" y1="20" x2="20" y2="50"/>
    <line x1="380" y1="220" x2="350" y2="220"/>
    <line x1="380" y1="220" x2="380" y2="190"/>
  </g>
</svg>