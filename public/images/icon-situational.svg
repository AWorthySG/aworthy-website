<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Envelope body -->
  <rect x="10" y="22" width="46" height="34" rx="2" stroke="#2B5A8C" stroke-width="1.5" fill="rgba(43,90,140,0.15)"/>
  <!-- Envelope flap -->
  <path d="M10 22 L33 42 L56 22" stroke="#2B5A8C" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
  <!-- Envelope bottom fold lines -->
  <path d="M10 56 L26 40" stroke="#2B5A8C" stroke-width="1" opacity="0.3"/>
  <path d="M56 56 L40 40" stroke="#2B5A8C" stroke-width="1" opacity="0.3"/>
  <!-- Letter peeking out -->
  <rect x="16" y="16" width="34" height="14" rx="1" stroke="#2B5A8C" stroke-width="1" fill="white" opacity="0.6"/>
  <line x1="20" y1="22" x2="36" y2="22" stroke="#2B5A8C" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <line x1="20" y1="26" x2="32" y2="26" stroke="#2B5A8C" stroke-width="1" stroke-linecap="round" opacity="0.4"/>
  <!-- Gold seal/stamp -->
  <circle cx="44" cy="48" r="5" fill="#D4853A" opacity="0.9"/>
  <circle cx="44" cy="48" r="3" fill="none" stroke="white" stroke-width="0.8" opacity="0.6"/>
  <!-- Pen -->
  <g transform="translate(50, 28) rotate(40)">
    <rect x="0" y="-2.5" width="24" height="5" rx="1.2" stroke="#D4853A" stroke-width="1.5" fill="none"/>
    <path d="M24 -1.5 L28.5 0 L24 1.5" stroke="#D4853A" stroke-width="1.5" stroke-linejoin="round" fill="#D4853A"/>
    <line x1="6" y1="-2.5" x2="6" y2="2.5" stroke="#D4853A" stroke-width="0.8"/>
  </g>
</svg>
