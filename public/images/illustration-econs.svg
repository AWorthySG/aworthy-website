<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <!-- Background -->
  <rect width="400" height="240" fill="#F5F1EB"/>

  <!-- Decorative dots -->
  <circle cx="30" cy="30" r="2" fill="#2B5A8C" opacity="0.1"/>
  <circle cx="50" cy="48" r="1.5" fill="#D4853A" opacity="0.08"/>
  <circle cx="365" cy="35" r="2.5" fill="#D4853A" opacity="0.12"/>
  <circle cx="375" cy="195" r="2" fill="#2B5A8C" opacity="0.08"/>
  <circle cx="25" cy="205" r="1.5" fill="#D4853A" opacity="0.1"/>

  <!-- Grid lines (subtle) -->
  <g opacity="0.05" stroke="#2B5A8C" stroke-width="0.5">
    <line x1="80" y1="50" x2="80" y2="195"/>
    <line x1="80" y1="195" x2="340" y2="195"/>
    <!-- Horizontal grid -->
    <line x1="80" y1="165" x2="340" y2="165" stroke-dasharray="2,4"/>
    <line x1="80" y1="135" x2="340" y2="135" stroke-dasharray="2,4"/>
    <line x1="80" y1="105" x2="340" y2="105" stroke-dasharray="2,4"/>
    <line x1="80" y1="75" x2="340" y2="75" stroke-dasharray="2,4"/>
  </g>

  <!-- Axis lines -->
  <line x1="80" y1="50" x2="80" y2="198" stroke="#2B5A8C" stroke-width="1.5" opacity="0.3"/>
  <line x1="77" y1="195" x2="345" y2="195" stroke="#2B5A8C" stroke-width="1.5" opacity="0.3"/>

  <!-- Axis labels (subtle) -->
  <text x="75" y="48" font-family="sans-serif" font-size="8" fill="#2B5A8C" opacity="0.25" text-anchor="end">P</text>
  <text x="348" y="198" font-family="sans-serif" font-size="8" fill="#2B5A8C" opacity="0.25">Q</text>

  <!-- Bar chart -->
  <rect x="105" y="155" width="28" height="40" rx="2" fill="#2B5A8C" opacity="0.2"/>
  <rect x="148" y="135" width="28" height="60" rx="2" fill="#2B5A8C" opacity="0.35"/>
  <rect x="191" y="110" width="28" height="85" rx="2" fill="#2B5A8C" opacity="0.5"/>
  <rect x="234" y="90" width="28" height="105" rx="2" fill="#2B5A8C" opacity="0.65"/>
  <rect x="277" y="72" width="28" height="123" rx="2" fill="#2B5A8C" opacity="0.8"/>

  <!-- Supply curve (upward sloping) -->
  <path d="M95 180 Q150 160 200 130 Q250 100 310 65" stroke="#2B5A8C" stroke-width="2" fill="none" opacity="0.4" stroke-linecap="round"/>
  <text x="315" y="62" font-family="sans-serif" font-size="9" fill="#2B5A8C" opacity="0.3" font-weight="bold">S</text>

  <!-- Demand curve (downward sloping) -->
  <path d="M95 65 Q150 90 200 130 Q250 165 310 180" stroke="#D4853A" stroke-width="2" fill="none" opacity="0.5" stroke-linecap="round"/>
  <text x="315" y="183" font-family="sans-serif" font-size="9" fill="#D4853A" opacity="0.4" font-weight="bold">D</text>

  <!-- Equilibrium point -->
  <circle cx="200" cy="130" r="4" fill="#D4853A" opacity="0.6"/>
  <circle cx="200" cy="130" r="7" fill="none" stroke="#D4853A" stroke-width="1" opacity="0.25"/>

  <!-- Dashed lines to equilibrium -->
  <line x1="80" y1="130" x2="200" y2="130" stroke="#D4853A" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>
  <line x1="200" y1="130" x2="200" y2="195" stroke="#D4853A" stroke-width="0.8" stroke-dasharray="3,3" opacity="0.3"/>

  <!-- Gold trend line (upward) -->
  <path d="M100 175 Q140 165 175 145 Q210 125 245 108 Q280 90 315 68" stroke="#D4853A" stroke-width="2.5" fill="none" stroke-linecap="round"/>

  <!-- Upward trend arrow -->
  <path d="M310 72 L318 62 L322 75" stroke="#D4853A" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- Currency symbol -->
  <text x="55" y="120" font-family="sans-serif" font-size="28" fill="#D4853A" opacity="0.1" font-weight="bold">$</text>
  <text x="330" y="155" font-family="sans-serif" font-size="22" fill="#2B5A8C" opacity="0.07" font-weight="bold">$</text>

  <!-- Small percentage indicators -->
  <g opacity="0.15">
    <text x="285" y="65" font-family="sans-serif" font-size="9" fill="#D4853A" font-weight="bold">+12%</text>
  </g>

  <!-- Decorative corner lines -->
  <g opacity="0.08" stroke="#2B5A8C" stroke-width="1">
    <line x1="20" y1="20" x2="50" y2="20"/>
    <line x1="20" y1="20" x2="20" y2="50"/>
    <line x1="380" y1="220" x2="350" y2="220"/>
    <line x1="380" y1="220" x2="380" y2="190"/>
  </g>
</svg>