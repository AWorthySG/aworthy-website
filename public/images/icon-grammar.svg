<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Pencil body -->
  <g transform="translate(12, 56) rotate(-45)">
    <rect x="0" y="-4" width="42" height="8" rx="1" stroke="#2B5A8C" stroke-width="1.5" fill="rgba(43,90,140,0.15)"/>
    <!-- Pencil tip -->
    <path d="M42 -4 L50 0 L42 4" stroke="#2B5A8C" stroke-width="1.5" stroke-linejoin="round" fill="#D4853A"/>
    <!-- Eraser -->
    <rect x="-8" y="-4" width="8" height="8" rx="1" stroke="#2B5A8C" stroke-width="1.5" fill="#D4853A" opacity="0.6"/>
    <!-- Band -->
    <line x1="0" y1="-4" x2="0" y2="4" stroke="#2B5A8C" stroke-width="1.5"/>
    <line x1="36" y1="-4" x2="36" y2="4" stroke="#2B5A8C" stroke-width="1" opacity="0.5"/>
  </g>
  <!-- X mark (error) - fading out -->
  <g opacity="0.4">
    <line x1="14" y1="14" x2="24" y2="24" stroke="#2B5A8C" stroke-width="2" stroke-linecap="round"/>
    <line x1="24" y1="14" x2="14" y2="24" stroke="#2B5A8C" stroke-width="2" stroke-linecap="round"/>
  </g>
  <!-- Arrow from X to check -->
  <path d="M27 19 Q32 16 36 17" stroke="#D4853A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M34 14 L37 17 L33 19" stroke="#D4853A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- Checkmark (correct) -->
  <path d="M40 20 L45 25 L55 13" stroke="#D4853A" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
