<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <!-- Checklist paper -->
  <rect x="12" y="10" width="38" height="52" rx="2" stroke="#2B5A8C" stroke-width="1.5" fill="rgba(43,90,140,0.15)"/>
  <!-- Checkbox 1 checked -->
  <rect x="18" y="20" width="8" height="8" rx="1" stroke="#2B5A8C" stroke-width="1.5" fill="none"/>
  <path d="M20 24.5 L22.5 27 L27 21" stroke="#D4853A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="30" y1="24" x2="44" y2="24" stroke="#2B5A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checkbox 2 checked -->
  <rect x="18" y="33" width="8" height="8" rx="1" stroke="#2B5A8C" stroke-width="1.5" fill="none"/>
  <path d="M20 37.5 L22.5 40 L27 34" stroke="#D4853A" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="30" y1="37" x2="42" y2="37" stroke="#2B5A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Checkbox 3 unchecked -->
  <rect x="18" y="46" width="8" height="8" rx="1" stroke="#2B5A8C" stroke-width="1.5" fill="none"/>
  <line x1="30" y1="50" x2="40" y2="50" stroke="#2B5A8C" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Magnifying glass -->
  <circle cx="56" cy="48" r="12" stroke="#2B5A8C" stroke-width="2" fill="rgba(43,90,140,0.08)"/>
  <line x1="64.5" y1="56.5" x2="72" y2="64" stroke="#2B5A8C" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Lens highlight -->
  <path d="M50 43 Q52 40 55 41" stroke="#D4853A" stroke-width="1.5" stroke-linecap="round" fill="none"/>
</svg>
