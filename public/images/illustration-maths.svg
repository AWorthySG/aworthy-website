<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 240" fill="none">
  <rect width="400" height="240" rx="12" fill="#F8F5FF"/>
  <rect x="20" y="20" width="360" height="200" rx="8" fill="white" stroke="#E8E0F0" stroke-width="1.5"/>
  <!-- Grid lines -->
  <line x1="60" y1="40" x2="60" y2="200" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="120" y1="40" x2="120" y2="200" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="180" y1="40" x2="180" y2="200" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="240" y1="40" x2="240" y2="200" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="300" y1="40" x2="300" y2="200" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="360" y1="40" x2="360" y2="200" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="40" y1="60" x2="370" y2="60" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="40" y1="100" x2="370" y2="100" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="40" y1="140" x2="370" y2="140" stroke="#E8E0F0" stroke-width="0.75"/>
  <line x1="40" y1="180" x2="370" y2="180" stroke="#E8E0F0" stroke-width="0.75"/>
  <!-- Axes -->
  <line x1="60" y1="40" x2="60" y2="200" stroke="#7B5EA7" stroke-width="2" stroke-linecap="round"/>
  <line x1="40" y1="180" x2="370" y2="180" stroke="#7B5EA7" stroke-width="2" stroke-linecap="round"/>
  <!-- Quadratic curve -->
  <path d="M80 170 Q140 40 200 100 Q260 160 320 50 L340 60" stroke="#7B5EA7" stroke-width="2.5" stroke-linecap="round" fill="none"/>
  <!-- Points -->
  <circle cx="80" cy="170" r="4" fill="#7B5EA7"/>
  <circle cx="200" cy="100" r="4" fill="#7B5EA7"/>
  <circle cx="320" cy="50" r="4" fill="#7B5EA7"/>
  <!-- Labels -->
  <text x="55" y="35" font-family="sans-serif" font-size="11" fill="#7B5EA7" text-anchor="end">y</text>
  <text x="375" y="185" font-family="sans-serif" font-size="11" fill="#7B5EA7">x</text>
  <!-- Triangle overlay -->
  <polygon points="240,180 320,180 320,120" stroke="#9B7EC7" stroke-width="1.5" fill="rgba(123,94,167,0.08)" stroke-dasharray="4 3"/>
  <!-- Angle arc -->
  <path d="M305 180 A15 15 0 0 1 320 165" stroke="#9B7EC7" stroke-width="1.5" fill="none"/>
  <text x="298" y="172" font-family="sans-serif" font-size="9" fill="#9B7EC7">θ</text>
  <!-- Formula -->
  <text x="200" y="225" font-family="sans-serif" font-size="13" fill="#7B5EA7" text-anchor="middle" font-weight="600">y = ax² + bx + c</text>
</svg>
