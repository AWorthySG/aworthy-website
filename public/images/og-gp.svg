<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#2B5A8C"/>

  <!-- Subtle background pattern -->
  <defs>
    <pattern id="dots-gp" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots-gp)"/>

  <!-- Gold accent bar at top -->
  <rect width="1200" height="8" fill="#D4853A"/>

  <!-- A+ Logo Mark -->
  <g transform="translate(80, 50)">
    <rect x="0" y="0" width="64" height="64" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="32" y="36" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#FDFBF7" text-anchor="middle" dominant-baseline="central">A</text>
    <text x="50" y="20" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#D4853A" text-anchor="middle" dominant-baseline="central">+</text>
  </g>

  <!-- Globe icon -->
  <g transform="translate(600, 195)" opacity="0.9">
    <circle cx="0" cy="0" r="32" fill="none" stroke="#D4853A" stroke-width="3"/>
    <ellipse cx="0" cy="0" rx="16" ry="32" fill="none" stroke="#D4853A" stroke-width="2"/>
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#D4853A" stroke-width="2"/>
    <line x1="-28" y1="-16" x2="28" y2="-16" stroke="rgba(212,133,58,0.6)" stroke-width="1.5"/>
    <line x1="-28" y1="16" x2="28" y2="16" stroke="rgba(212,133,58,0.6)" stroke-width="1.5"/>
    <line x1="0" y1="-32" x2="0" y2="32" stroke="rgba(212,133,58,0.4)" stroke-width="1"/>
  </g>

  <!-- Subject label -->
  <text x="600" y="300" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#D4853A" text-anchor="middle" letter-spacing="4">SUBJECT</text>

  <!-- Main title -->
  <text x="600" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="58" font-weight="700" fill="#FDFBF7" text-anchor="middle">H1 General Paper</text>

  <!-- Gold underline -->
  <rect x="400" y="392" width="400" height="4" rx="2" fill="#D4853A"/>

  <!-- Subtitle -->
  <text x="600" y="445" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#FDFBF7" text-anchor="middle" letter-spacing="1">Tuition</text>

  <!-- Brand name -->
  <text x="600" y="510" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="rgba(253,251,247,0.7)" text-anchor="middle">A-Worthy Singapore</text>

  <!-- Bottom bar -->
  <rect y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>
  <text x="1120" y="612" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="rgba(253,251,247,0.6)" text-anchor="end">a-worthy.com</text>
</svg>