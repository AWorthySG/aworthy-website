<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 300" fill="none">
  <!-- Isometric notepad with pen — for programme cards -->

  <!-- Notepad shadow -->
  <ellipse cx="200" cy="260" rx="100" ry="15" fill="#2B5A8C" opacity="0.06"/>

  <!-- Notepad body -->
  <path d="M120 240 L200 270 L280 240 L280 80 L200 50 L120 80Z" fill="#FFFFFF" stroke="#E8EAED" stroke-width="1"/>
  <path d="M120 80 L200 110 L280 80" fill="none" stroke="#E8EAED" stroke-width="1"/>
  <path d="M200 110 L200 270" stroke="#E8EAED" stroke-width="0.5" opacity="0.3"/>

  <!-- Lined paper -->
  <g opacity="0.15">
    <line x1="140" y1="130" x2="260" y2="130" stroke="#2B5A8C" stroke-width="0.8"/>
    <line x1="140" y1="150" x2="260" y2="150" stroke="#2B5A8C" stroke-width="0.8"/>
    <line x1="140" y1="170" x2="260" y2="170" stroke="#2B5A8C" stroke-width="0.8"/>
    <line x1="140" y1="190" x2="260" y2="190" stroke="#2B5A8C" stroke-width="0.8"/>
    <line x1="140" y1="210" x2="260" y2="210" stroke="#2B5A8C" stroke-width="0.8"/>
    <line x1="140" y1="230" x2="260" y2="230" stroke="#2B5A8C" stroke-width="0.8"/>
  </g>

  <!-- Written text lines -->
  <line x1="145" y1="128" x2="220" y2="128" stroke="#2B5A8C" stroke-width="1.5" opacity="0.3" stroke-linecap="round"/>
  <line x1="145" y1="148" x2="240" y2="148" stroke="#2B5A8C" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>
  <line x1="145" y1="168" x2="210" y2="168" stroke="#D4853A" stroke-width="1.5" opacity="0.4" stroke-linecap="round"/>
  <line x1="145" y1="188" x2="235" y2="188" stroke="#2B5A8C" stroke-width="1.5" opacity="0.2" stroke-linecap="round"/>
  <line x1="145" y1="208" x2="195" y2="208" stroke="#2B5A8C" stroke-width="1.5" opacity="0.25" stroke-linecap="round"/>

  <!-- Pen -->
  <g transform="translate(260, 100) rotate(30)">
    <rect x="-3" y="-50" width="6" height="80" rx="2" fill="#1A2A3A"/>
    <rect x="-3" y="-50" width="6" height="15" rx="2" fill="#D4853A"/>
    <polygon points="-3,30 3,30 0,42" fill="#E8EAED"/>
    <rect x="-3" y="22" width="6" height="8" fill="#D4853A"/>
  </g>

  <!-- Floating checkmark -->
  <g transform="translate(310, 80)">
    <circle cx="0" cy="0" r="16" fill="#2B5A8C" opacity="0.1"/>
    <polyline points="-6,0 -2,5 8,-6" stroke="#2B5A8C" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.5"/>
  </g>
</svg>
