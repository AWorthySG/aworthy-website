<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <!-- Isometric 3D stacked books with pen and graduation cap -->

  <!-- Shadow under books -->
  <ellipse cx="400" cy="340" rx="200" ry="30" fill="#2B5A8C" opacity="0.08"/>

  <!-- Bottom book (blue) -->
  <g>
    <path d="M280 280 L400 340 L520 280 L400 220Z" fill="#3B7AB5"/>
    <path d="M280 280 L280 260 L400 200 L400 220Z" fill="#2B5A8C"/>
    <path d="M400 220 L400 200 L520 260 L520 280Z" fill="#4A8AC5"/>
    <path d="M280 260 L400 320 L520 260 L400 200Z" fill="#5B9AD5"/>
    <!-- Book spine detail -->
    <path d="M280 260 L280 280 L282 280 L282 260Z" fill="#D4853A"/>
  </g>

  <!-- Middle book (warm) -->
  <g transform="translate(10, -30)">
    <path d="M290 270 L400 325 L510 270 L400 215Z" fill="#E29A55"/>
    <path d="M290 270 L290 252 L400 197 L400 215Z" fill="#D4853A"/>
    <path d="M400 215 L400 197 L510 252 L510 270Z" fill="#E8A862"/>
    <path d="M290 252 L400 307 L510 252 L400 197Z" fill="#F0B870"/>
    <path d="M290 252 L290 270 L292 270 L292 252Z" fill="#2B5A8C"/>
  </g>

  <!-- Top book (blue, slightly rotated) -->
  <g transform="translate(-5, -55)">
    <path d="M300 265 L410 318 L530 258 L420 205Z" fill="#4A8AC5"/>
    <path d="M300 265 L300 248 L420 188 L420 205Z" fill="#2B5A8C"/>
    <path d="M420 205 L420 188 L530 241 L530 258Z" fill="#5B9AD5"/>
    <path d="M300 248 L410 301 L530 241 L420 188Z" fill="#6BAAE0"/>
    <path d="M300 248 L300 265 L302 265 L302 248Z" fill="#D4853A"/>
  </g>

  <!-- Pen (diagonal) -->
  <g transform="rotate(-25, 500, 220)">
    <rect x="480" y="160" width="8" height="100" rx="2" fill="#1A1A1A"/>
    <rect x="480" y="160" width="8" height="20" rx="2" fill="#D4853A"/>
    <polygon points="484,260 480,260 484,275 488,260" fill="#E8EAED"/>
    <rect x="480" y="245" width="8" height="15" fill="#D4853A"/>
  </g>

  <!-- Graduation cap floating above -->
  <g transform="translate(0, -10)">
    <!-- Cap board -->
    <path d="M370 130 L400 110 L430 130 L400 150Z" fill="#1A2A3A"/>
    <path d="M370 130 L400 115 L430 130 L400 145Z" fill="#2B3A4A"/>
    <!-- Tassel -->
    <line x1="430" y1="130" x2="445" y2="155" stroke="#D4853A" stroke-width="2"/>
    <circle cx="445" cy="158" r="4" fill="#D4853A"/>
    <!-- Cap top -->
    <path d="M385 125 L400 105 L415 125 L400 135Z" fill="#1A2A3A"/>
  </g>

  <!-- Floating A+ symbol -->
  <g transform="translate(250, 140)">
    <circle cx="0" cy="0" r="24" fill="#2B5A8C" opacity="0.1"/>
    <text x="0" y="6" text-anchor="middle" font-family="Inter, sans-serif" font-size="18" font-weight="700" fill="#2B5A8C">A+</text>
  </g>

  <!-- Floating dots decoration -->
  <circle cx="550" cy="150" r="4" fill="#D4853A" opacity="0.4"/>
  <circle cx="570" cy="170" r="3" fill="#2B5A8C" opacity="0.3"/>
  <circle cx="260" cy="180" r="3" fill="#D4853A" opacity="0.3"/>
  <circle cx="240" cy="160" r="5" fill="#2B5A8C" opacity="0.2"/>
</svg>
