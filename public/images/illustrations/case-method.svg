<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" fill="none">
  <!-- CASE Method - Four connected isometric cubes -->

  <!-- Connecting lines -->
  <line x1="180" y1="150" x2="280" y2="150" stroke="#E8EAED" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="380" y1="150" x2="480" y2="150" stroke="#E8EAED" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="580" y1="150" x2="680" y2="150" stroke="#E8EAED" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- C cube -->
  <g transform="translate(100, 100)">
    <path d="M40 0 L80 20 L80 70 L40 50Z" fill="#3B7AB5"/>
    <path d="M0 20 L40 0 L40 50 L0 70Z" fill="#2B5A8C"/>
    <path d="M0 20 L40 0 L80 20 L40 40Z" fill="#5B9AD5"/>
    <text x="40" y="32" text-anchor="middle" font-family="Playfair Display, serif" font-size="22" font-weight="600" fill="#fff">C</text>
  </g>

  <!-- A cube -->
  <g transform="translate(300, 100)">
    <path d="M40 0 L80 20 L80 70 L40 50Z" fill="#E29A55"/>
    <path d="M0 20 L40 0 L40 50 L0 70Z" fill="#D4853A"/>
    <path d="M0 20 L40 0 L80 20 L40 40Z" fill="#F0B870"/>
    <text x="40" y="32" text-anchor="middle" font-family="Playfair Display, serif" font-size="22" font-weight="600" fill="#fff">A</text>
  </g>

  <!-- S cube -->
  <g transform="translate(500, 100)">
    <path d="M40 0 L80 20 L80 70 L40 50Z" fill="#3B7AB5"/>
    <path d="M0 20 L40 0 L40 50 L0 70Z" fill="#2B5A8C"/>
    <path d="M0 20 L40 0 L80 20 L40 40Z" fill="#5B9AD5"/>
    <text x="40" y="32" text-anchor="middle" font-family="Playfair Display, serif" font-size="22" font-weight="600" fill="#fff">S</text>
  </g>

  <!-- E cube -->
  <g transform="translate(700, 100)">
    <path d="M40 0 L80 20 L80 70 L40 50Z" fill="#E29A55"/>
    <path d="M0 20 L40 0 L40 50 L0 70Z" fill="#D4853A"/>
    <path d="M0 20 L40 0 L80 20 L40 40Z" fill="#F0B870"/>
    <text x="40" y="32" text-anchor="middle" font-family="Playfair Display, serif" font-size="22" font-weight="600" fill="#fff">E</text>
  </g>

  <!-- Labels -->
  <text x="140" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#4A4A4A" letter-spacing="0.05em">CONTEXTUALISE</text>
  <text x="340" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#4A4A4A" letter-spacing="0.05em">ANALYSE</text>
  <text x="540" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#4A4A4A" letter-spacing="0.05em">STRUCTURE</text>
  <text x="740" y="220" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" font-weight="500" fill="#4A4A4A" letter-spacing="0.05em">EVALUATE</text>

  <!-- Time labels -->
  <text x="140" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8A8A8A">10 MIN</text>
  <text x="340" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8A8A8A">20 MIN</text>
  <text x="540" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8A8A8A">20 MIN</text>
  <text x="740" y="240" text-anchor="middle" font-family="JetBrains Mono, monospace" font-size="9" fill="#8A8A8A">10 MIN</text>

  <!-- Arrow connectors -->
  <polygon points="275,148 285,150 275,152" fill="#2B5A8C"/>
  <polygon points="475,148 485,150 475,152" fill="#D4853A"/>
  <polygon points="675,148 685,150 675,152" fill="#2B5A8C"/>
</svg>
