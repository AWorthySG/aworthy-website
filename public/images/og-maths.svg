<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#2B5A8C"/>

  <!-- Subtle background pattern -->
  <defs>
    <pattern id="dots-mt" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="rgba(255,255,255,0.05)"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#dots-mt)"/>

  <!-- Gold accent bar at top -->
  <rect width="1200" height="8" fill="#D4853A"/>

  <!-- A+ Logo Mark -->
  <g transform="translate(80, 50)">
    <rect x="0" y="0" width="64" height="64" rx="12" fill="rgba(255,255,255,0.12)"/>
    <text x="32" y="36" font-family="Arial, Helvetica, sans-serif" font-size="32" font-weight="700" fill="#FDFBF7" text-anchor="middle" dominant-baseline="central">A</text>
    <text x="50" y="20" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#D4853A" text-anchor="middle" dominant-baseline="central">+</text>
  </g>

  <!-- Coordinate grid and curve icon -->
  <g transform="translate(600, 195)" opacity="0.9">
    <!-- Grid lines (light) -->
    <line x1="-45" y1="-30" x2="45" y2="-30" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="-45" y1="-10" x2="45" y2="-10" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="-45" y1="10" x2="45" y2="10" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="-20" y1="-45" x2="-20" y2="35" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="0" y1="-45" x2="0" y2="35" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <line x1="20" y1="-45" x2="20" y2="35" stroke="rgba(255,255,255,0.12)" stroke-width="1"/>
    <!-- Axes -->
    <line x1="-45" y1="30" x2="45" y2="30" stroke="#D4853A" stroke-width="2.5" stroke-linecap="round"/>
    <line x1="-40" y1="-40" x2="-40" y2="35" stroke="#D4853A" stroke-width="2.5" stroke-linecap="round"/>
    <!-- Curve y = ax² -->
    <path d="M-38 28 Q-20 -5 0 -30 Q20 -5 38 28" fill="none" stroke="#FDFBF7" stroke-width="3" stroke-linecap="round"/>
    <!-- Points on curve -->
    <circle cx="-38" cy="28" r="3.5" fill="#D4853A"/>
    <circle cx="0" cy="-30" r="3.5" fill="#D4853A"/>
    <circle cx="38" cy="28" r="3.5" fill="#D4853A"/>
    <!-- Arrow tips on axes -->
    <polygon points="45,30 38,27 38,33" fill="#D4853A"/>
    <polygon points="-40,-40 -43,-33 -37,-33" fill="#D4853A"/>
  </g>

  <!-- Subject label -->
  <text x="600" y="300" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700" fill="#D4853A" text-anchor="middle" letter-spacing="4">SUBJECT</text>

  <!-- Main title -->
  <text x="600" y="370" font-family="Georgia, 'Times New Roman', serif" font-size="62" font-weight="700" fill="#FDFBF7" text-anchor="middle">O-Level Mathematics</text>

  <!-- Gold underline -->
  <rect x="340" y="392" width="520" height="4" rx="2" fill="#D4853A"/>

  <!-- Subtitle -->
  <text x="600" y="445" font-family="Georgia, 'Times New Roman', serif" font-size="28" fill="#FDFBF7" text-anchor="middle" letter-spacing="1">Tuition</text>

  <!-- Brand name -->
  <text x="600" y="510" font-family="Arial, Helvetica, sans-serif" font-size="24" fill="rgba(253,251,247,0.7)" text-anchor="middle">A-Worthy Singapore</text>

  <!-- Bottom bar -->
  <rect y="580" width="1200" height="50" fill="rgba(0,0,0,0.2)"/>
  <text x="1120" y="612" font-family="Arial, Helvetica, sans-serif" font-size="18" fill="rgba(253,251,247,0.6)" text-anchor="end">a-worthy.com</text>
</svg>
